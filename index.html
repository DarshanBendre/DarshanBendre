<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Free GitHub Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f8;
            color: #222;
        }

        header {
            background: #24292f;
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        section {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
        }

        a {
            color: #0969da;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Website</h1>
        <p>This site is hosted for free using GitHub Pages.</p>
    </header>

    <section>
        <h2>About</h2>
        <p>This is a sample static website created with HTML and hosted from a GitHub repository.</p>

        <h2>Contact</h2>
        <p>Email: example@email.com</p>
    </section>
</body>
</html>
